<!doctype html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f4ed" />
    <title>LoopForge · 自驱编排工作台</title>

    <!-- 防闪：首帧前按 localStorage/系统偏好定主题，避免暗色闪白 -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("loopforge:theme") || "auto";
          document.documentElement.dataset.theme = t;
          var dark = t === "dark" || (t === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.content = dark ? "#1c1a17" : "#f5f4ed";
        } catch (e) {}
      })();
    </script>

    <!-- Anthropic 编辑风字体：Source Serif 4（标题/数字/正文）· Noto Serif SC（中文衬线）· Inter（UI）· JetBrains Mono（代码） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
